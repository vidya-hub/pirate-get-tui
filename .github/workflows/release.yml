name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.4.2)'
        required: true
        default: '0.4.2'

env:
  PYTHON_VERSION: '3.11'

jobs:
  # Build source distribution and wheel
  build-python:
    name: Build Python Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools
      
      - name: Build package
        run: python -m build
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/

  # Build Ubuntu .deb package
  build-ubuntu:
    name: Build Ubuntu Package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - ubuntu: '22.04'
            codename: 'jammy'
          - ubuntu: '24.04'
            codename: 'noble'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot debhelper
          pip install --upgrade pip setuptools wheel
      
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
      
      - name: Build .deb package
        run: |
          chmod +x release/ubuntu/build-deb.sh
          cd release/ubuntu
          ./build-deb.sh "${{ steps.version.outputs.version }}"
        env:
          UBUNTU_CODENAME: ${{ matrix.codename }}
      
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-${{ matrix.codename }}-deb
          path: release/ubuntu/*.deb

  # Build macOS package
  build-macos:
    name: Build macOS Package
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Build macOS package
        run: |
          chmod +x release/macos/build-macos.sh
          cd release/macos
          ./build-macos.sh "${{ steps.version.outputs.version }}"
        env:
          TARGET_ARCH: ${{ matrix.arch }}
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-pkg
          path: release/macos/*.tar.gz

  # Create GitHub Release
  release:
    name: Create Release
    needs: [build-python, build-ubuntu, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          
          # Python packages
          cp artifacts/python-package/* release-assets/ || true
          
          # Ubuntu packages
          find artifacts -name "*.deb" -exec cp {} release-assets/ \;
          
          # macOS packages
          find artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;
          
          # Generate checksums
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          
          echo "Release assets:"
          ls -la
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: pirate-get v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/*
          body: |
            ## pirate-get v${{ steps.version.outputs.version }}
            
            ### Installation
            
            **Via pip (recommended):**
            ```bash
            pip install pirate-get
            ```
            
            **Via install script:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```
            
            **Ubuntu/Debian:**
            Download the appropriate `.deb` file and install:
            ```bash
            sudo dpkg -i pirate-get_${{ steps.version.outputs.version }}_amd64.deb
            sudo apt-get install -f  # Install dependencies if needed
            ```
            
            **macOS:**
            Download the appropriate `.tar.gz` and extract:
            ```bash
            tar -xzf pirate-get-${{ steps.version.outputs.version }}-macos-*.tar.gz
            cd pirate-get-${{ steps.version.outputs.version }}
            ./install.sh
            ```
            
            Or via Homebrew (if formula is added to a tap):
            ```bash
            brew install pirate-get
            ```
            
            ### Checksums
            See `SHA256SUMS.txt` for file checksums.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Update Homebrew formula (optional - requires separate tap repo)
  update-homebrew:
    name: Update Homebrew Formula
    needs: [release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Download source tarball and compute SHA
        id: sha
        run: |
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${{ steps.version.outputs.version }}.tar.gz"
          curl -sL "$TARBALL_URL" -o source.tar.gz
          SHA256=$(sha256sum source.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "Source SHA256: $SHA256"
      
      - name: Update Homebrew formula
        run: |
          # Update the formula with new version and SHA
          sed -i "s|url \".*\"|url \"https://github.com/${{ github.repository }}/archive/refs/tags/v${{ steps.version.outputs.version }}.tar.gz\"|" release/macos/pirate-get.rb
          sed -i "s|sha256 \".*\"|sha256 \"${{ steps.sha.outputs.sha256 }}\"|" release/macos/pirate-get.rb
          
          echo "Updated Homebrew formula:"
          cat release/macos/pirate-get.rb
      
      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release/macos/pirate-get.rb
          git diff --staged --quiet || git commit -m "chore: update Homebrew formula to v${{ steps.version.outputs.version }}"
          git push || echo "Nothing to push or push failed (may need PAT for protected branches)"
